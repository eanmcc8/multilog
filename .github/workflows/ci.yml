name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Compile
        run: python -m compileall mlx demos tests

      - name: Lint
        run: ruff check mlx demos tests

      - name: Test
        run: pytest tests -q
