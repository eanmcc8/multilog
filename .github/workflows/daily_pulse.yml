name: Daily System Pulse (Randomized)

permissions:
  contents: write

on:
  schedule:
    # Fixed at 01:00 AM UTC; random delay below staggers commit times across repos
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  update-pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Randomized Pulse Update
        run: |
          python3 -c "
          import datetime, re, time, random

          # Random delay 1-3600s so commit timestamps never align across repos
          wait_time = random.randint(1, 3600)
          print(f'Random delay: {wait_time} seconds...')
          time.sleep(wait_time)

          with open('README.md', 'r', encoding='utf-8') as f:
              content = f.read()

          current_date = datetime.datetime.now().strftime('%Y-%m-%d')
          new_content = re.sub(r'Last_Pulse-.*?-blue', f'Last_Pulse-{current_date}-blue', content)

          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(new_content)
          "

      - name: Commit and Push Changes
        run: |
          git config --local user.email "bot@multilogin-automation"
          git config --local user.name "multilogin-automation-bot"
          git add README.md
          git commit -m "chore: daily system pulse update $(date +'%Y-%m-%d') [skip ci]" || echo "No changes to commit"
          git push
